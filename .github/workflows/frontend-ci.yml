name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-e2e-test:
    name: Build React App & Run E2E Tests
    runs-on: ubuntu-latest
    
    # ADD ENVIRONMENT VARIABLES HERE
    env:
      BACK_END_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
      # You can add other environment variables too
      REACT_APP_ENV: ci-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build
      # The build process will use the BACK_END_URL from env

    - name: Install Chrome for Selenium
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser

    # RUN BOTH SELENIUM TESTS
    - name: Run Login Test
      run: npm run selenium-test
      # Tests will have access to BACK_END_URL

    - name: Run Add Profile Test
      run: npm run selenium-add
      # Tests will have access to BACK_END_URL