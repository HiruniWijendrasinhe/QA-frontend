name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-e2e-test:
    name: Build React App & Run E2E Tests
    runs-on: ubuntu-latest
    
    env:
      REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
      REACT_APP_ENV: ci-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: CI=false npm run build
      env:
        REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}

    - name: Install Chrome for Selenium
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser

    # RUN BOTH SELENIUM TESTS
    - name: Run Login Test
      run: npm run selenium-test
      env:
        REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}

    - name: Run Add Profile Test
      run: npm run selenium-add
      env:
        REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}